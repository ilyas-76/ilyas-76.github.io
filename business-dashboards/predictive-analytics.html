<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predictive Analytics Dashboard | AlphaStatLab</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --bg: #060c14; --card: #0b1524; --card2: #0e1c2e;
        --border: #142035; --glow1: rgba(0,255,200,0.15); --glow2: rgba(0,140,255,0.12);
        --a1: #00ffc8; --a2: #0096ff; --a3: #ff6b35; --a4: #ffe066; --a5: #c084fc;
        --text: #cce8ff; --muted: #4a6080; --danger: #ff4444; --warn: #ffaa00; --safe: #00cc88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    body::before {
        content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: linear-gradient(rgba(0,255,200,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,200,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
    }
    .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; }
    
    header {
        background: rgba(6,12,20,0.95); border-bottom: 1px solid var(--a1)33;
        padding: 0 2rem; height: 68px; display: flex; align-items: center; justify-content: space-between;
        backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Exo 2', sans-serif; font-weight: 900; font-size: 1.3rem; letter-spacing: 3px; }
    .logo em { color: var(--a1); font-style: normal; }
    .htitle { font-family: 'Share Tech Mono'; font-size: 0.8rem; letter-spacing: 4px; color: var(--a1); text-transform: uppercase; text-shadow: 0 0 10px var(--a1); }
    .status-bar { display: flex; align-items: center; gap: 0.8rem; }
    .model-badge { background: rgba(0,255,200,0.08); border: 1px solid var(--a1)55; padding: 4px 12px; border-radius: 4px; font-family: 'Share Tech Mono'; font-size: 0.68rem; color: var(--a1); letter-spacing: 1px; }
    
    .loading { text-align: center; padding: 60px; font-size: 14px; color: var(--muted); background: var(--card); margin: 20px; border-radius: 12px; }
    .loading i { animation: spin 1s linear infinite; margin-right: 10px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .metric-strip { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 1px solid var(--border); background: var(--card); }
    .metric-box { padding: 1.2rem 1.5rem; border-right: 1px solid var(--border); transition: all 0.3s ease; cursor: default; }
    .metric-box:hover { background: rgba(0,255,200,0.03); transform: translateY(-2px); }
    .metric-box:last-child { border-right: none; }
    .metric-box::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
    .ml { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .mv { font-family: 'Share Tech Mono'; font-size: 1.7rem; line-height: 1; }
    .ms { font-size: 0.68rem; margin-top: 0.3rem; color: var(--muted); }
    
    .ctrl {
        background: var(--card); border-bottom: 1px solid var(--border);
        padding: 0.8rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        position: sticky; top: 68px; z-index: 99;
    }
    .cl { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .tbg { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px; gap: 2px; }
    .tb {
        padding: 5px 14px; font-size: 0.72rem; font-family: 'Exo 2'; font-weight: 500;
        border-radius: 4px; border: none; background: transparent; color: var(--muted);
        cursor: pointer; transition: all 0.15s;
    }
    .tb:hover { color: var(--a1); }
    .tb.active { background: var(--a1); color: #060c14; font-weight: 700; }
    select {
        background: var(--card2); border: 1px solid var(--border); color: var(--text);
        padding: 5px 10px; border-radius: 6px; font-size: 0.72rem; font-family: 'Exo 2';
        cursor: pointer; transition: all 0.2s;
    }
    select:hover { border-color: var(--a1); }
    select:focus { outline: none; border-color: var(--a1); }
    
    .g1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; padding: 1.5rem; margin-bottom: 0; }
    .g2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; padding: 0 1.5rem; margin-bottom: 1.5rem; }
    .g3 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; padding: 0 1.5rem; margin-bottom: 2rem; }
    
    .card {
        background: var(--card); border: 1px solid var(--border); border-radius: 12px;
        padding: 1.4rem; transition: all 0.3s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(0,255,200,0.08); }
    .ct { font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; color: var(--text); margin-bottom: 0.2rem; }
    .cs { font-size: 0.68rem; color: var(--muted); margin-bottom: 1.2rem; }
    .ct i { margin-right: 6px; color: var(--a1); }
    canvas { max-height: 240px; width: 100%; }
    
    .alert-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
    .alert-item {
        display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem;
        border-radius: 8px; border-left: 3px solid; font-size: 0.72rem;
        transition: all 0.2s;
    }
    .alert-item:hover { transform: translateX(3px); }
    .alert-item.high { border-color: var(--danger); background: rgba(255,68,68,0.06); }
    .alert-item.med { border-color: var(--warn); background: rgba(255,170,0,0.06); }
    .alert-item.safe { border-color: var(--safe); background: rgba(0,204,136,0.04); }
    .alert-sku { font-family: 'Share Tech Mono'; font-size: 0.68rem; color: var(--a1); flex-shrink: 0; width: 80px; }
    .alert-name { flex: 1; }
    .alert-risk { font-family: 'Share Tech Mono'; font-size: 0.7rem; font-weight: 600; }
    .high .alert-risk { color: var(--danger); }
    .med .alert-risk { color: var(--warn); }
    .safe .alert-risk { color: var(--safe); }
    
    .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 0.8rem; }
    .model-card {
        border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem;
        background: var(--card2); transition: all 0.2s;
    }
    .model-card:hover { border-color: var(--a1); }
    .model-name { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.3rem; }
    .model-mape { font-family: 'Share Tech Mono'; font-size: 1.2rem; font-weight: 600; }
    .model-bar { height: 4px; border-radius: 2px; margin-top: 0.4rem; background: var(--border); overflow: hidden; }
    .model-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
    
    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    th { font-size: 0.6rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); text-align: left; }
    td { padding: 0.5rem 0.7rem; border-bottom: 1px solid rgba(20,32,53,0.8); }
    tr:hover td { background: rgba(0,255,200,0.02); }
    .risk-h { color: var(--danger); font-weight: 600; }
    .risk-m { color: var(--warn); font-weight: 600; }
    .risk-l { color: var(--safe); }
    .abc-a { color: var(--a1); font-weight: 700; }
    .abc-b { color: var(--a4); font-weight: 700; }
    .abc-c { color: var(--muted); }
    
    footer { border-top: 1px solid var(--border); padding: 1.2rem 2rem; display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); margin-top: 1rem; }
    footer a { color: var(--a1); text-decoration: none; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .metric-box, .card, .alert-item { animation: fadeInUp 0.5s ease forwards; }
    .metric-box:nth-child(1) { animation-delay: 0.05s; }
    .metric-box:nth-child(2) { animation-delay: 0.1s; }
    .metric-box:nth-child(3) { animation-delay: 0.15s; }
    .metric-box:nth-child(4) { animation-delay: 0.2s; }
    .metric-box:nth-child(5) { animation-delay: 0.25s; }
    
    @media (max-width: 1200px) { .g1, .g2, .g3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Alpha<em>Stat</em>Lab</div>
        <div class="htitle"><i class="fas fa-brain"></i> PREDICTIVE ANALYTICS · ML FORECASTING ENGINE</div>
        <div class="status-bar">
            <div class="model-badge"><i class="fas fa-microchip"></i> ENSEMBLE v4.2</div>
            <div class="model-badge" style="color:var(--a4);border-color:var(--a4)55"><i class="fas fa-chart-line"></i> LIVE DEMO</div>
        </div>
    </header>
    
    <div id="dashboardContent">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading predictive analytics data from CSV...</div>
    </div>
    
    <footer>
        <span><i class="fas fa-database"></i> ⚠️ <strong>Synthetic Data:</strong> All forecasts are <strong>randomly generated</strong> demo data — not from real supply chains or ML models.</span>
        <span><i class="far fa-chart-bar"></i> AlphaStatLab © 2025</span>
    </footer>
</div>

<script>
    // Generate synthetic predictive data (since CSV parsing can be unreliable)
    function generatePredictiveData() {
        const categories = ['Electronics', 'Apparel', 'Office', 'Healthcare', 'Sports', 'Food & Bev', 'Automotive', 'Home & Garden'];
        const warehouses = ['East Coast', 'West Coast', 'Central Depot', 'European DC', 'APAC Fulfillment'];
        const models = ['XGBoost', 'Prophet', 'ARIMA', 'LSTM', 'Ensemble'];
        const data = [];
        
        for (let i = 1; i <= 500; i++) {
            const category = categories[Math.floor(Math.random() * categories.length)];
            const warehouse = warehouses[Math.floor(Math.random() * warehouses.length)];
            const actual = 1000 + Math.random() * 8000;
            const forecast = actual * (0.85 + Math.random() * 0.3);
            const error = Math.abs((forecast - actual) / actual * 100);
            const model = models[Math.floor(Math.random() * models.length)];
            let stockRisk = 'Low';
            if (error > 20) stockRisk = 'High';
            else if (error > 10) stockRisk = 'Medium';
            let abc = 'B';
            if (actual > 5000) abc = 'A';
            else if (actual < 2000) abc = 'C';
            
            data.push({
                SKU: `SKU-${1000 + i}`,
                Category: category,
                Warehouse: warehouse,
                Actual_Demand: Math.round(actual),
                Forecast_Demand: Math.round(forecast),
                Forecast_Error_Pct: error.toFixed(1),
                Model_Used: model,
                Stockout_Risk: stockRisk,
                Overstock_Risk: stockRisk === 'High' ? 'Low' : (stockRisk === 'Medium' ? 'Medium' : 'High'),
                ABC_Classification: abc,
                Days_Of_Supply: Math.round(20 + Math.random() * 80),
                Revenue_Forecast: Math.round(forecast * 100)
            });
        }
        return data;
    }
    
    const predictiveData = generatePredictiveData();
    
    function renderDashboard(data) {
        // Calculate aggregates
        const totalSKUs = new Set(data.map(d => d.SKU)).size;
        const avgMAPE = (data.reduce((sum, d) => sum + parseFloat(d.Forecast_Error_Pct), 0) / data.length).toFixed(1);
        const highRiskCount = data.filter(d => d.Stockout_Risk === 'High').length;
        const totalRevenue = data.reduce((sum, d) => sum + d.Revenue_Forecast, 0) / 1e6;
        const avgDaysSupply = (data.reduce((sum, d) => sum + d.Days_Of_Supply, 0) / data.length).toFixed(0);
        
        // Category aggregates for chart
        const categories = [...new Set(data.map(d => d.Category))];
        const actualByCat = categories.map(c => data.filter(d => d.Category === c).reduce((s, d) => s + d.Actual_Demand, 0));
        const forecastByCat = categories.map(c => data.filter(d => d.Category === c).reduce((s, d) => s + d.Forecast_Demand, 0));
        
        // Risk distribution
        const lowRisk = data.filter(d => d.Stockout_Risk === 'Low').length;
        const medRisk = data.filter(d => d.Stockout_Risk === 'Medium').length;
        const highRisk = data.filter(d => d.Stockout_Risk === 'High').length;
        
        // High risk alerts
        const highRiskAlerts = data.filter(d => d.Stockout_Risk === 'High').slice(0, 6);
        
        // Model accuracy
        const modelMAPE = {
            'XGBoost': 12.04, 'Prophet': 12.32, 'LSTM': 13.67, 'ARIMA': 13.90, 'Ensemble': 13.73
        };
        
        // Top SKUs for table
        const topSKUs = data.sort((a,b) => b.Actual_Demand - a.Actual_Demand).slice(0, 10);
        
        document.getElementById('dashboardContent').innerHTML = `
            <div class="metric-strip">
                <div class="metric-box"><div class="ml"><i class="fas fa-box"></i> SKUs Tracked</div><div class="mv" style="color:var(--a1)">${totalSKUs}</div><div class="ms">Across ${categories.length} categories</div></div>
                <div class="metric-box"><div class="ml"><i class="fas fa-chart-line"></i> Avg MAPE</div><div class="mv" style="color:var(--a2)">${avgMAPE}%</div><div class="ms">Forecast accuracy</div></div>
                <div class="metric-box"><div class="ml"><i class="fas fa-exclamation-triangle"></i> Stockout Risk</div><div class="mv" style="color:var(--danger)">${highRisk}</div><div class="ms">HIGH risk SKUs</div></div>
                <div class="metric-box"><div class="ml"><i class="fas fa-dollar-sign"></i> Total Rev Forecast</div><div class="mv" style="color:var(--a4)">$${totalRevenue.toFixed(0)}M</div><div class="ms">12-month projection</div></div>
                <div class="metric-box"><div class="ml"><i class="fas fa-calendar"></i> Avg Days Supply</div><div class="mv" style="color:var(--a5)">${avgDaysSupply}d</div><div class="ms">Across all warehouses</div></div>
            </div>
            
            <div class="ctrl">
                <span class="cl">View:</span>
                <div class="tbg">
                    <button class="tb active" data-view="demand">Demand Forecast</button>
                    <button class="tb" data-view="inventory">Inventory</button>
                    <button class="tb" data-view="models">ML Models</button>
                    <button class="tb" data-view="risk">Risk Analysis</button>
                    <button class="tb" data-view="revenue">Revenue Forecast</button>
                </div>
                <span class="cl" style="margin-left:auto">Category:</span>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <span class="cl">Warehouse:</span>
                <select id="warehouseFilter">
                    <option value="all">All Warehouses</option>
                    <option value="East Coast">East Coast</option>
                    <option value="West Coast">West Coast</option>
                    <option value="Central Depot">Central Depot</option>
                    <option value="European DC">European DC</option>
                    <option value="APAC Fulfillment">APAC Fulfillment</option>
                </select>
                <span class="cl">Model:</span>
                <select id="modelFilter">
                    <option value="all">All Models</option>
                    <option value="XGBoost">XGBoost</option>
                    <option value="Prophet">Prophet</option>
                    <option value="ARIMA">ARIMA</option>
                    <option value="LSTM">LSTM</option>
                    <option value="Ensemble">Ensemble</option>
                </select>
            </div>
            
            <div class="g1">
                <div class="card">
                    <div class="ct"><i class="fas fa-chart-bar"></i> Actual vs Forecast Demand — By Category</div>
                    <div class="cs">Grouped comparison across product categories</div>
                    <canvas id="demandChart"></canvas>
                </div>
                <div class="card">
                    <div class="ct"><i class="fas fa-chart-pie"></i> Stockout Risk Distribution</div>
                    <div class="cs">Risk level across ${data.length} SKU records</div>
                    <canvas id="stockoutChart"></canvas>
                    <div style="margin-top: 1rem">
                        <div class="ct" style="font-size:0.78rem"><i class="fas fa-bell"></i> High Priority Alerts</div>
                        <div class="alert-list">
                            ${highRiskAlerts.map(alert => `
                                <div class="alert-item high">
                                    <div class="alert-sku">${alert.SKU}</div>
                                    <div class="alert-name">${alert.Category}</div>
                                    <div class="alert-risk">HIGH RISK</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="g2">
                <div class="card">
                    <div class="ct"><i class="fas fa-chart-line"></i> 12-Month Revenue Forecast</div>
                    <div class="cs">Forecast with confidence bands</div>
                    <canvas id="revForecastChart"></canvas>
                </div>
                <div class="card">
                    <div class="ct"><i class="fas fa-chart-line"></i> Seasonality Index</div>
                    <div class="cs">Demand seasonality pattern across months</div>
                    <canvas id="seasonChart"></canvas>
                </div>
                <div class="card">
                    <div class="ct"><i class="fas fa-microchip"></i> ML Model Accuracy (MAPE)</div>
                    <div class="cs">Mean Absolute Percentage Error — lower is better</div>
                    <canvas id="mapeChart"></canvas>
                    <div class="model-grid">
                        ${Object.entries(modelMAPE).map(([model, mape], idx) => `
                            <div class="model-card">
                                <div class="model-name" style="color:${idx === 0 ? 'var(--a1)' : idx === 1 ? 'var(--a2)' : idx === 2 ? 'var(--a5)' : 'var(--a3)'}">${model}</div>
                                <div class="model-mape" style="color:${idx === 0 ? 'var(--a1)' : idx === 1 ? 'var(--a2)' : idx === 2 ? 'var(--a5)' : 'var(--a3)'}">${mape}%</div>
                                <div class="model-bar"><div class="model-bar-fill" style="width:${Math.max(10, 100 - (mape - 10) * 8)}%; background:${idx === 0 ? 'var(--a1)' : idx === 1 ? 'var(--a2)' : idx === 2 ? 'var(--a5)' : 'var(--a3)'}"></div></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
            
            <div class="g3">
                <div class="card">
                    <div class="ct"><i class="fas fa-table-list"></i> SKU Forecast Detail — Top Products</div>
                    <div class="cs">Actual vs Forecast · Stockout Risk · ABC Classification</div>
                    <div style="overflow-x: auto">
                        <table>
                            <thead><tr><th>SKU</th><th>Category</th><th>Warehouse</th><th>Actual</th><th>Forecast</th><th>Error%</th><th>Model</th><th>Stock Risk</th><th>ABC</th><th>Days Supply</th></tr></thead>
                            <tbody id="skuTable"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <div class="ct"><i class="fas fa-chart-bar"></i> Warehouse Inventory Status</div>
                    <div class="cs">On-hand inventory by location</div>
                    <canvas id="warehouseChart"></canvas>
                    <div style="margin-top: 1rem">
                        <div class="ct" style="font-size:0.78rem"><i class="fas fa-chart-pie"></i> Forecast by External Factor</div>
                        <canvas id="extFactorChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        `;
        
        // Animate model bars
        setTimeout(() => {
            document.querySelectorAll('.model-bar-fill').forEach(bar => {
                const width = bar.style.width;
                bar.style.width = '0%';
                setTimeout(() => { bar.style.width = width; }, 100);
            });
        }, 200);
        
        // Demand Chart
        new Chart(document.getElementById('demandChart'), {
            type: 'bar',
            data: { labels: categories, datasets: [
                { label: 'Actual Demand', data: actualByCat, backgroundColor: 'rgba(0,255,200,0.6)', borderColor: '#00ffc8', borderWidth: 2, borderRadius: 8 },
                { label: 'Forecast', data: forecastByCat, backgroundColor: 'rgba(0,150,255,0.5)', borderColor: '#0096ff', borderWidth: 2, borderRadius: 8 }
            ] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } }, scales: { y: { ticks: { callback: v => (v/1000).toFixed(0) + 'K' } } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // Stockout Donut
        new Chart(document.getElementById('stockoutChart'), {
            type: 'doughnut',
            data: { labels: ['Low Risk', 'Medium Risk', 'High Risk'], datasets: [{ data: [lowRisk, medRisk, highRisk], backgroundColor: ['#00cc88', '#ffaa00', '#ff4444'], borderWidth: 0, hoverOffset: 10 }] },
            options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // Revenue Forecast
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const forecastRev = months.map((_, i) => 180 + 20 * Math.sin(2 * Math.PI * i / 12) + i * 2);
        const upper = forecastRev.map(v => v * 1.12);
        const lower = forecastRev.map(v => v * 0.88);
        new Chart(document.getElementById('revForecastChart'), {
            type: 'line',
            data: { labels: months, datasets: [
                { label: 'Upper CI', data: upper, borderColor: 'rgba(0,255,200,0.2)', borderWidth: 1, fill: '+1', backgroundColor: 'rgba(0,255,200,0.05)', pointRadius: 0 },
                { label: 'Forecast', data: forecastRev, borderColor: '#00ffc8', borderWidth: 2.5, fill: false, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#00ffc8' },
                { label: 'Lower CI', data: lower, borderColor: 'rgba(0,255,200,0.2)', borderWidth: 1, fill: false, pointRadius: 0 }
            ] },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } }, scales: { y: { ticks: { callback: v => '$' + v + 'M' } } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // Seasonality Radar
        const seasonIdx = [0.82, 0.78, 0.90, 0.95, 1.08, 1.12, 1.05, 0.98, 1.02, 1.15, 1.28, 1.35];
        new Chart(document.getElementById('seasonChart'), {
            type: 'radar',
            data: { labels: months, datasets: [{ label: 'Seasonality Index', data: seasonIdx, borderColor: '#c084fc', backgroundColor: 'rgba(192,132,252,0.1)', pointBackgroundColor: '#c084fc', pointRadius: 4, borderWidth: 2 }] },
            options: { responsive: true, scales: { r: { suggestedMin: 0.6, suggestedMax: 1.5, ticks: { stepSize: 0.3 } } }, plugins: { legend: { position: 'bottom' } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // MAPE Chart
        new Chart(document.getElementById('mapeChart'), {
            type: 'bar',
            data: { labels: Object.keys(modelMAPE), datasets: [{ label: 'MAPE %', data: Object.values(modelMAPE), backgroundColor: ['#00ffc8', '#0096ff', '#c084fc', '#ff6b35', '#ffe066'], borderRadius: 8 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v + '%' }, min: 10, max: 16 } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // Warehouse Chart
        new Chart(document.getElementById('warehouseChart'), {
            type: 'bar',
            data: { labels: ['East Coast', 'West Coast', 'Central', 'European', 'APAC'], datasets: [{ label: 'Inventory On Hand', data: [4200, 3800, 5600, 3100, 4800], backgroundColor: 'rgba(0,150,255,0.6)', borderRadius: 8 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // External Factor Chart
        new Chart(document.getElementById('extFactorChart'), {
            type: 'doughnut',
            data: { labels: ['None', 'Holiday', 'Weather', 'Economic'], datasets: [{ data: [280, 90, 75, 55], backgroundColor: ['#4a6080', '#00ffc8', '#0096ff', '#ffe066'], borderWidth: 0 }] },
            options: { responsive: true, cutout: '50%', plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 10 } } } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
        
        // SKU Table
        const riskClass = { 'High': 'risk-h', 'Medium': 'risk-m', 'Low': 'risk-l' };
        const abcClass = { 'A': 'abc-a', 'B': 'abc-b', 'C': 'abc-c' };
        document.getElementById('skuTable').innerHTML = topSKUs.map(s => `
            <tr>
                <td style="font-family:monospace; color:var(--a1)">${s.SKU}</td>
                <td>${s.Category}</td>
                <td style="color:var(--muted)">${s.Warehouse}</td>
                <td style="font-family:monospace">${s.Actual_Demand.toLocaleString()}</td>
                <td style="font-family:monospace; color:var(--a2)">${s.Forecast_Demand.toLocaleString()}</td>
                <td style="font-family:monospace; color:${parseFloat(s.Forecast_Error_Pct) > 15 ? '#ffaa00' : '#00cc88'}">${s.Forecast_Error_Pct}%</td>
                <td style="color:var(--a5)">${s.Model_Used}</td>
                <td class="${riskClass[s.Stockout_Risk]}">${s.Stockout_Risk}</td>
                <td class="${abcClass[s.ABC_Classification]}">${s.ABC_Classification}</td>
                <td style="font-family:monospace">${s.Days_Of_Supply}d</td>
            </tr>
        `).join('');
        
        // Store filter functions
        window.applyFilters = function() {
            const category = document.getElementById('categoryFilter').value;
            const warehouse = document.getElementById('warehouseFilter').value;
            const model = document.getElementById('modelFilter').value;
            
            let filtered = [...predictiveData];
            if (category !== 'all') filtered = filtered.filter(d => d.Category === category);
            if (warehouse !== 'all') filtered = filtered.filter(d => d.Warehouse === warehouse);
            if (model !== 'all') filtered = filtered.filter(d => d.Model_Used === model);
            
            renderDashboard(filtered);
        };
        
        // Attach event listeners
        document.getElementById('categoryFilter').addEventListener('change', () => window.applyFilters());
        document.getElementById('warehouseFilter').addEventListener('change', () => window.applyFilters());
        document.getElementById('modelFilter').addEventListener('change', () => window.applyFilters());
        
        // View switching
        document.querySelectorAll('.tb').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tb').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                // Smooth scroll to charts
                document.querySelector('.g1').scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    }
    
    renderDashboard(predictiveData);
</script>
</body>
</html>
